version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: examedge-postgres
    environment:
      POSTGRES_DB: examedge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: examedge-redis
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
